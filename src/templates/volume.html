<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volume</title>
<script type="application/ld+json">{{ jsonld|safe }}</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;
  color:var(--wcp-color-text, #e6edf3);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;}
.vol-wrap{height:100%;display:flex;align-items:center;justify-content:center;position:relative;}
/* Icon button */
.vol-btn{background:none;border:none;color:var(--wcp-color-text-muted, #8b949e);cursor:pointer;
  padding:4px;border-radius:6px;transition:color .15s,background .15s;line-height:1;display:flex;
  align-items:center;justify-content:center;width:32px;height:32px;flex-shrink:0;}
.vol-btn:hover{color:var(--wcp-color-text, #e6edf3);background:var(--wcp-color-primary-surface, rgba(240,136,62,.1));}
.vol-btn.active{color:var(--wcp-color-primary, #f0883e);}
/* Vertical slider — replaces icon in compact (masthead) mode */
.vol-vslider{display:none;width:32px;height:100%;align-items:center;justify-content:center;padding:6px 0;}
.vol-vslider.open{display:flex;}
.vol-vslider input{-webkit-appearance:slider-vertical;appearance:slider-vertical;writing-mode:bt-lr;
  width:8px;height:100%;accent-color:var(--wcp-color-primary, #f0883e);cursor:pointer;margin:0;}
/* Horizontal panel — used when there's room (stave context, wide container) */
.vol-hpanel{display:none;align-items:center;gap:6px;padding:0 8px;height:100%;flex:1;min-width:0;}
.vol-hpanel.open{display:flex;}
.vol-icon{font-size:13px;flex-shrink:0;color:var(--wcp-color-text-muted, #8b949e);line-height:1;user-select:none;}
.vol-hslider{-webkit-appearance:none;appearance:none;flex:1;height:4px;border-radius:2px;
  background:var(--wcp-color-border, #30363d);outline:none;cursor:pointer;min-width:40px;}
.vol-hslider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--wcp-color-primary, #f0883e);cursor:pointer;border:none;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.vol-hslider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
  background:var(--wcp-color-primary, #f0883e);cursor:pointer;border:none;}
</style>
</head>
<body>
<div class="vol-wrap" id="vol-wrap">
  <!-- Icon button (always rendered; hidden when slider is open in compact mode) -->
  <button class="vol-btn" id="vol-btn" onclick="togglePanel()" title="Volume">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
    </svg>
  </button>
  <!-- Vertical slider (compact: replaces icon in-place) -->
  <div class="vol-vslider" id="vol-vslider">
    <input type="range" id="vol-v" min="0" max="100" value="80" orient="vertical"
      oninput="syncSlider(this.value)" onclick="event.stopPropagation()">
  </div>
  <!-- Horizontal panel (wide: icon + mute icon + slider + max icon) -->
  <div class="vol-hpanel" id="vol-hpanel">
    <span class="vol-icon" title="Mute">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <line x1="23" y1="9" x2="17" y2="15"/>
        <line x1="17" y1="9" x2="23" y2="15"/>
      </svg>
    </span>
    <input type="range" class="vol-hslider" id="vol-h" min="0" max="100" value="80"
      oninput="syncSlider(this.value)">
    <span class="vol-icon" title="Max">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
    </span>
  </div>
</div>
<script>
const WCP_ORCHESTRATION_ID = "{{ wcp_orchestration_id|default('', true) }}";
const WCP_APPLICATION_ID   = "{{ wcp_application_id|default('', true) }}";
function wcpFetch(url, opts) {
  opts = opts || {};
  const extra = {};
  if (WCP_ORCHESTRATION_ID) extra['Wcp-Orchestration-Id'] = WCP_ORCHESTRATION_ID;
  if (WCP_APPLICATION_ID)   extra['Wcp-Application-Id']   = WCP_APPLICATION_ID;
  opts.headers = Object.assign({}, opts.headers || {}, extra);
  return fetch(url, opts);
}

const btn      = document.getElementById('vol-btn');
const vSlider  = document.getElementById('vol-vslider');
const hPanel   = document.getElementById('vol-hpanel');
const vInput   = document.getElementById('vol-v');
const hInput   = document.getElementById('vol-h');
let panelOpen  = false;
let currentVol = 80;

function isCompact() { return window.innerWidth <= 60; }

function togglePanel() {
  panelOpen = !panelOpen;
  btn.classList.toggle('active', panelOpen);
  if (panelOpen) {
    if (isCompact()) {
      btn.style.display = 'none';
      vSlider.classList.add('open');
      hPanel.classList.remove('open');
    } else {
      btn.style.display = 'none';
      hPanel.classList.add('open');
      vSlider.classList.remove('open');
    }
  } else {
    btn.style.display = '';
    vSlider.classList.remove('open');
    hPanel.classList.remove('open');
  }
}

// Sync both sliders and write to server (debounced)
let sendTimer = null;
function syncSlider(val) {
  currentVol = parseInt(val);
  vInput.value = currentVol;
  hInput.value = currentVol;
  clearTimeout(sendTimer);
  sendTimer = setTimeout(() => {
    wcpFetch('/widget/api/state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ volume: currentVol }),
    }).catch(() => {});
  }, 150);
}

// Close panel when clicking outside
document.addEventListener('click', e => {
  if (panelOpen && !e.target.closest('#vol-wrap')) {
    panelOpen = false;
    btn.style.display = '';
    vSlider.classList.remove('open');
    hPanel.classList.remove('open');
    btn.classList.remove('active');
  }
});

// Poll server state to stay in sync
async function pollVolume() {
  try {
    const r = await wcpFetch('/widget/api/state');
    const d = await r.json();
    if (typeof d.volume === 'number') {
      const focused = document.activeElement === vInput || document.activeElement === hInput;
      if (!focused) {
        currentVol = d.volume;
        vInput.value = currentVol;
        hInput.value = currentVol;
      }
    }
  } catch {}
}
pollVolume();
setInterval(pollVolume, 4000);

// WCP context + ready
window.parent?.postMessage({ type: 'wcp:ready' }, '*');
window.parent?.postMessage({ type: 'wcp:request-theme' }, '*');
window.addEventListener('message', e => {
  const vars = (e.data?.type === 'wcp:context' && e.data.theme) ? e.data.theme
             : (e.data?.type === 'wcp:theme' && e.data.vars) ? e.data.vars : null;
  if (vars) {
    for (const [k, v] of Object.entries(vars))
      document.documentElement.style.setProperty(k, v);
  }
});
</script>
</body>
</html>
