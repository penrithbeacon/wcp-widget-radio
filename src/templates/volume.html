<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volume</title>
<script type="application/ld+json">{{ jsonld|safe }}</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:visible;background:transparent;
  color:var(--text,#e6edf3);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;}
.vol-wrap{height:100%;display:flex;align-items:center;justify-content:center;position:relative;}
.vol-btn{background:none;border:none;color:var(--muted,#8b949e);cursor:pointer;font-size:18px;
  padding:4px;border-radius:6px;transition:color .15s,background .15s;line-height:1;display:flex;
  align-items:center;justify-content:center;width:32px;height:32px;flex-shrink:0;}
.vol-btn:hover{color:var(--text,#e6edf3);background:rgba(240,136,62,.12);}
.vol-btn.active{color:var(--accent,#f0883e);}
/* Slider panel — appears inline to the right of the icon */
.vol-panel{display:none;align-items:center;gap:6px;padding:0 8px;height:100%;flex:1;min-width:0;}
.vol-panel.open{display:flex;}
.vol-icon{font-size:13px;flex-shrink:0;color:var(--muted,#8b949e);line-height:1;user-select:none;}
.vol-slider{-webkit-appearance:none;appearance:none;flex:1;height:4px;border-radius:2px;
  background:var(--border,#30363d);outline:none;cursor:pointer;min-width:40px;}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--accent,#f0883e);cursor:pointer;border:none;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.vol-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
  background:var(--accent,#f0883e);cursor:pointer;border:none;}
.vol-slider::-webkit-slider-runnable-track{height:4px;border-radius:2px;}
</style>
</head>
<body>
<div class="vol-wrap">
  <button class="vol-btn" id="vol-btn" onclick="togglePanel()" title="Volume">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
    </svg>
  </button>
  <div class="vol-panel" id="vol-panel">
    <span class="vol-icon" title="Mute">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <line x1="23" y1="9" x2="17" y2="15"/>
        <line x1="17" y1="9" x2="23" y2="15"/>
      </svg>
    </span>
    <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="80">
    <span class="vol-icon" title="Max">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
    </span>
  </div>
</div>
<script>
const WCP_ORCHESTRATION_ID = "{{ wcp_orchestration_id|default('', true) }}";
const WCP_APPLICATION_ID   = "{{ wcp_application_id|default('', true) }}";
function wcpFetch(url, opts) {
  opts = opts || {};
  const extra = {};
  if (WCP_ORCHESTRATION_ID) extra['Wcp-Orchestration-Id'] = WCP_ORCHESTRATION_ID;
  if (WCP_APPLICATION_ID)   extra['Wcp-Application-Id']   = WCP_APPLICATION_ID;
  opts.headers = Object.assign({}, opts.headers || {}, extra);
  return fetch(url, opts);
}

const slider = document.getElementById('vol-slider');
const panel  = document.getElementById('vol-panel');
const btn    = document.getElementById('vol-btn');
let panelOpen = false;

function togglePanel() {
  panelOpen = !panelOpen;
  panel.classList.toggle('open', panelOpen);
  btn.classList.toggle('active', panelOpen);
}

// Send volume change to server
let sendTimer = null;
slider.addEventListener('input', () => {
  clearTimeout(sendTimer);
  sendTimer = setTimeout(() => {
    wcpFetch('/widget/api/state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ volume: parseInt(slider.value) }),
    }).catch(() => {});
  }, 150);
});

// Poll server state to stay in sync
async function pollVolume() {
  try {
    const r = await wcpFetch('/widget/api/state');
    const d = await r.json();
    if (typeof d.volume === 'number' && document.activeElement !== slider) {
      slider.value = d.volume;
    }
  } catch {}
}
pollVolume();
setInterval(pollVolume, 4000);

// WCP context + ready
window.parent?.postMessage({ type: 'wcp:ready' }, '*');
window.addEventListener('message', e => {
  if (e.data?.type === 'wcp:context' && e.data.theme) {
    for (const [k, v] of Object.entries(e.data.theme))
      document.documentElement.style.setProperty(k, v);
  }
});
</script>
</body>
</html>
