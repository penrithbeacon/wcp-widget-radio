<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playing LED</title>
<script type="application/ld+json">{{ jsonld|safe }}</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;display:flex;align-items:center;justify-content:center;}
.led{width:16px;height:16px;border-radius:50%;background:var(--wcp-color-danger);transition:background .4s;filter:drop-shadow(0 0 4px currentColor);}
.led.playing{background:var(--wcp-color-success);animation:pulse 1.8s ease-in-out infinite;}
@keyframes pulse{0%,100%{filter:drop-shadow(0 0 4px currentColor)}50%{filter:drop-shadow(0 0 12px currentColor)}}
</style>
</head>
<body>
<div class="led" id="led"></div>
<script>
const WCP_ORCHESTRATION_ID = "{{ wcp_orchestration_id|default('', true) }}";
const WCP_APPLICATION_ID   = "{{ wcp_application_id|default('', true) }}";
function wcpFetch(url, opts) {
  opts = opts || {};
  const extra = {};
  if (WCP_ORCHESTRATION_ID) extra['Wcp-Orchestration-Id'] = WCP_ORCHESTRATION_ID;
  if (WCP_APPLICATION_ID)   extra['Wcp-Application-Id']   = WCP_APPLICATION_ID;
  opts.headers = Object.assign({}, opts.headers || {}, extra);
  return fetch(url, opts);
}
async function poll() {
  try {
    const r = await wcpFetch('/widget/api/state');
    const d = await r.json();
    document.getElementById('led').className = d.playing ? 'led playing' : 'led';
  } catch {}
}
poll();
setInterval(poll, 3000);
window.parent?.postMessage({ type: 'wcp:ready' }, '*');
window.parent?.postMessage({ type: 'wcp:request-theme' }, '*');
if (window.location.hash.startsWith('#wcp-theme=')) {
  try { const _v = JSON.parse(atob(window.location.hash.slice(11))); for (const [k,v] of Object.entries(_v)) document.documentElement.style.setProperty(k,v); } catch {}
}
window.addEventListener('message', e => {
  const vars = (e.data?.type === 'wcp:context' && e.data.theme) ? e.data.theme
             : (e.data?.type === 'wcp:theme' && e.data.vars) ? e.data.vars : null;
  if (vars) {
    for (const [k, v] of Object.entries(vars))
      document.documentElement.style.setProperty(k, v);
  }
});
</script>
</body>
</html>
